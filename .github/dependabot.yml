version: 2
updates:
    - package-ecosystem: "gomod"
      directory: "/"
      schedule:
          interval: "weekly"
      commit-message:
          prefix: "deps(go):"

    - package-ecosystem: "npm"
      directory: "/web"
      schedule:
          interval: "weekly"
      commit-message:
          prefix: "deps(web):"

    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "weekly"
      commit-message:
          prefix: "deps(root):"

    - package-ecosystem: "cargo"
      directory: "/src-tauri"
      schedule:
          interval: "weekly"
      commit-message:
          prefix: "deps(tauri):"

    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
      commit-message:
          prefix: "deps(ci):"

    - package-ecosystem: "docker"
      directory: "/"
      schedule:
          interval: "monthly"
      commit-message:
          prefix: "deps(docker):"
