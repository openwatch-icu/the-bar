# CI: build, test, and vet on push and pull_request.
# Uses Go version from go.mod.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Check fmt
        run: |
          unformatted=$(gofmt -l ./cmd ./internal ./pkg)
          if [ -n "$unformatted" ]; then
            echo "The following files need 'gofmt -w':"
            echo "$unformatted"
            exit 1
          fi

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci

      - name: Lint
        run: cd web && npm run lint

      - name: Format check
        run: cd web && npm run format:check

      - name: Build
        run: cd web && npm run build

      - name: Test
        run: cd web && npm run test
