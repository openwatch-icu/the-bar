# The-barchat server. Copy .env.example to .env and adjust (ALLOWED_ORIGINS, INSTANCE_SLUG).
# Web client: run separately (cd web && npm run dev) and set VITE_WS_URL to http://localhost:8080.
services:
  server:
    build: .
    ports:
      - "9000:9000"
      - "8080:8080"
    volumes:
      - "${DATA_DIR:-./chatdata}:/data"
      - "${TLS_CERT_FILE:-./certs/cert.pem}:/certs/cert.pem"
      - "${TLS_KEY_FILE:-./certs/key.pem}:/certs/key.pem"
    environment:
      - DATA_DIR=/data
      - TCP_ADDR=:9000
      - HTTP_ADDR=:8080
      - ACCESS_CODE=${ACCESS_CODE}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://localhost:5173,tauri://localhost}
      - INSTANCE_SLUG=${INSTANCE_SLUG:-default}
      - MINIMUM_AGE=${MINIMUM_AGE:-0}
      - REDUCE_LOG_RATE=${REDUCE_LOG_RATE:-0}
      - ENABLE_RESET_SESSIONS=${ENABLE_RESET_SESSIONS:-0}
      - BAR_USER_ALLOWED=${BAR_USER_ALLOWED:-false}
      - SESSION_BAR_MINUTES=${SESSION_BAR_MINUTES:-0}
      - INACTIVITY_DISCONNECT_MINUTES=${INACTIVITY_DISCONNECT_MINUTES:-5}
      - LOG_BROADCAST_BODY=${LOG_BROADCAST_BODY:-1}
      - TLS_HTTP_ENABLE=${TLS_HTTP_ENABLE:-0}
      - TLS_CERT_FILE=/certs/cert.pem
      - TLS_KEY_FILE=/certs/key.pem
    restart: unless-stopped
